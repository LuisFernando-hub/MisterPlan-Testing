services:
  reservation-db:
    image: mysql:9.0
    container_name: reservation-db
    restart: always
    environment: 
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports: 
      - "3306:3306"
    volumes:
      - mysql_storage:/var/lib/mysql

volumes:
  mysql_storage:


